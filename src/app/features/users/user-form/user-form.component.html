<div class="feature-page">
  <app-page-header
    [title]="isEdit() ? 'Edit User' : 'Add User'"
    [breadcrumbs]="[
      { label: 'Users', route: '/users' },
      { label: isEdit() ? 'Edit' : 'Create' }
    ]"
  />

  @if (loading()) {
    <app-loading-spinner message="Loading user…" />
  } @else {
    <mat-card class="form-card">
      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="form-grid">
            <mat-form-field appearance="outline">
              <mat-label>Full Name</mat-label>
              <input matInput formControlName="fullName" />
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Email</mat-label>
              <input matInput type="email" formControlName="email" />
            </mat-form-field>

            @if (!isEdit()) {
              <mat-form-field appearance="outline">
                <mat-label>Password</mat-label>
                <input matInput type="password" formControlName="password" />
                <mat-hint>Minimum 8 characters</mat-hint>
              </mat-form-field>
            }

            <mat-form-field appearance="outline">
              <mat-label>Role</mat-label>
              <mat-select formControlName="roleId">
                @for (r of availableRoles(); track r.id) {
                  <mat-option [value]="r.id">{{ r.name }}</mat-option>
                }
              </mat-select>
              @if (!availableRoles().length) {
                <mat-hint>Create first user via API or seed roles</mat-hint>
              }
            </mat-form-field>

            <div class="full-width">
              <mat-slide-toggle formControlName="isActive">Active</mat-slide-toggle>
            </div>
          </div>

          <div class="form-actions">
            <button mat-button type="button" routerLink="/users">Cancel</button>
            <button mat-flat-button color="primary" type="submit" [disabled]="saving()">
              @if (saving()) { <mat-spinner diameter="20" /> }
              @else { {{ isEdit() ? 'Update User' : 'Create User' }} }
            </button>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  }
</div>
