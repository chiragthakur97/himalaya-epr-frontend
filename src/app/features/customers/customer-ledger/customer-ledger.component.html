<div class="feature-page">
  <app-page-header
    [title]="customer()?.name ?? 'Customer Ledger'"
    subtitle="Account statement with date filter, print & download"
    [breadcrumbs]="[
      { label: 'Customers', route: '/customers' },
      { label: customer()?.name ?? 'Ledger', route: customer() ? '/customers/' + customerId() : undefined },
      { label: 'Ledger' }
    ]"
  >
    <button actions mat-stroked-button [routerLink]="['/customers', customerId()]">
      <mat-icon>arrow_back</mat-icon>
      Back to Customer
    </button>
  </app-page-header>

  @if (customer(); as c) {
    <app-customer-ledger-panel [customerId]="customerId()" [customer]="c" />
  } @else {
    <app-loading-spinner message="Loading customer…" />
  }
</div>
