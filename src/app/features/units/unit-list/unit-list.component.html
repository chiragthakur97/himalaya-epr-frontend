<div class="feature-page">
  <app-page-header title="Units of Measure" subtitle="Manage unit master data for products">
    <button actions mat-flat-button color="primary" routerLink="/units/create">
      <mat-icon>add</mat-icon>
      Add Unit
    </button>
  </app-page-header>

  <app-data-table
    [columns]="columns"
    [data]="units()"
    [loading]="loading()"
    [totalCount]="units().length"
    [actions]="actions"
    emptyTitle="No units found"
    emptyDescription="Create your first unit to use in the product form."
    (actionClick)="onAction($event)"
  />
</div>
