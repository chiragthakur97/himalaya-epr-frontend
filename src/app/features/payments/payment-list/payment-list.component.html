<div class="feature-page">
  <app-page-header title="Payments" subtitle="Record and view customer payments">
    <button actions mat-flat-button color="primary" routerLink="/payments/create">
      <mat-icon>add</mat-icon>
      Record Payment
    </button>
  </app-page-header>

  <app-search-toolbar
    [showModeFilter]="true"
    modeLabel="Payment Mode"
    [modeOptions]="modeOptions"
    [showDateRange]="true"
    (modeChange)="onModeChange($event)"
    (dateFromChange)="onDateFrom($event)"
    (dateToChange)="onDateTo($event)"
    (clearFilters)="onClear()"
  />

  <app-data-table
    [columns]="columns"
    [data]="payments()"
    [loading]="loading()"
    [totalCount]="total()"
    [pageIndex]="pageIndex()"
    [pageSize]="pageSize()"
    emptyTitle="No payments found"
    (pageChange)="onPage($event)"
  />
</div>
