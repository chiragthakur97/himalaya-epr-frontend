<div class="feature-page">
  <app-page-header
    title="Adjust Stock"
    subtitle="Set absolute stock quantity after physical count"
    [breadcrumbs]="[
      { label: 'Inventory', route: '/inventory/history' },
      { label: 'Adjust Stock' }
    ]"
  />

  <mat-card class="form-card">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <app-product-autocomplete (productSelected)="onProductSelected($event)" />

        @if (selectedProduct(); as p) {
          <p class="stock-info">Current stock: <strong>{{ p.currentStock }}</strong></p>
        }

        <div class="form-grid">
          <mat-form-field appearance="outline">
            <mat-label>New Quantity</mat-label>
            <input matInput type="number" formControlName="newQuantity" min="0" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Remarks</mat-label>
            <textarea matInput formControlName="remarks" rows="2"></textarea>
          </mat-form-field>
        </div>

        <div class="form-actions">
          <button mat-button type="button" routerLink="/inventory/history">Cancel</button>
          <button mat-flat-button color="primary" type="submit" [disabled]="saving()">
            @if (saving()) { <mat-spinner diameter="20" /> } @else { Adjust Stock }
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
