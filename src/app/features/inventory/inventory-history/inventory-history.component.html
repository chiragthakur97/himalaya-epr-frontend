<div class="feature-page">
  <app-page-header title="Inventory" subtitle="Stock movements and history">
    <button actions mat-stroked-button routerLink="/inventory/add-stock">
      <mat-icon>add</mat-icon>
      Add Stock
    </button>
    <button actions mat-stroked-button routerLink="/inventory/remove-stock">
      <mat-icon>remove</mat-icon>
      Remove
    </button>
    <button actions mat-stroked-button routerLink="/inventory/adjust-stock">
      <mat-icon>tune</mat-icon>
      Adjust
    </button>
  </app-page-header>

  <div class="product-filter">
    <app-product-autocomplete
      label="Select Product"
      placeholder="Choose a product to view history…"
      (productSelected)="onProductSelected($event)"
    />
  </div>

  @if (!selectedProductId()) {
    <app-empty-state
      icon="warehouse"
      title="Select a product"
      description="Choose a product above to view its inventory transaction history."
    />
  } @else if (loading() && !entries().length) {
    <app-loading-spinner message="Loading history…" />
  } @else {
    <app-data-table
      [columns]="columns"
      [data]="entries()"
      [loading]="loading()"
      [totalCount]="total()"
      [pageIndex]="pageIndex()"
      [pageSize]="pageSize()"
      emptyTitle="No inventory transactions"
      (pageChange)="onPage($event)"
    />
  }
</div>
