<div class="feature-page">
  <app-page-header
    [title]="title"
    [subtitle]="subtitle"
    [breadcrumbs]="[
      { label: 'Inventory', route: '/inventory/history' },
      { label: title }
    ]"
  />

  <mat-card class="form-card">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <app-product-autocomplete (productSelected)="onProductSelected($event)" />

        @if (selectedProduct(); as p) {
          <p class="stock-info">Current stock: <strong>{{ p.currentStock }}</strong></p>
        }

        <div class="form-grid">
          <mat-form-field appearance="outline">
            <mat-label>Quantity</mat-label>
            <input matInput type="number" formControlName="quantity" min="1" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Reference Type</mat-label>
            <mat-select formControlName="referenceType">
              @for (t of referenceTypes; track t) {
                <mat-option [value]="t">{{ t }}</mat-option>
              }
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Reference ID</mat-label>
            <input matInput formControlName="referenceId" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Remarks</mat-label>
            <textarea matInput formControlName="remarks" rows="2"></textarea>
          </mat-form-field>
        </div>

        <div class="form-actions">
          <button mat-button type="button" routerLink="/inventory/history">Cancel</button>
          <button mat-flat-button color="primary" type="submit" [disabled]="saving()">
            @if (saving()) { <mat-spinner diameter="20" /> } @else { {{ submitLabel }} }
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
