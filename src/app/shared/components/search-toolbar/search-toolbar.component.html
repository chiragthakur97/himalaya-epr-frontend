<div class="search-toolbar">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search</mat-label>
    <mat-icon matPrefix>search</mat-icon>
    <input matInput [formControl]="searchControl" [placeholder]="searchPlaceholder()" />
  </mat-form-field>

  @if (showStatusFilter()) {
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Status</mat-label>
      <mat-select [formControl]="statusControl">
        @for (opt of statusOptions(); track opt.label) {
          <mat-option [value]="opt.value">{{ opt.label }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  }

  @if (showModeFilter()) {
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>{{ modeLabel() }}</mat-label>
      <mat-select [formControl]="modeControl">
        <mat-option [value]="null">All</mat-option>
        @for (opt of modeOptions(); track opt.label) {
          <mat-option [value]="opt.value">{{ opt.label }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  }

  @if (showDateRange()) {
    <mat-form-field appearance="outline" class="date-field">
      <mat-label>From</mat-label>
      <input matInput [matDatepicker]="fromPicker" [formControl]="dateFromControl" />
      <mat-datepicker-toggle matIconSuffix [for]="fromPicker" />
      <mat-datepicker #fromPicker />
    </mat-form-field>
    <mat-form-field appearance="outline" class="date-field">
      <mat-label>To</mat-label>
      <input matInput [matDatepicker]="toPicker" [formControl]="dateToControl" />
      <mat-datepicker-toggle matIconSuffix [for]="toPicker" />
      <mat-datepicker #toPicker />
    </mat-form-field>
  }

  <button mat-stroked-button type="button" (click)="onClear()">
    <mat-icon>filter_alt_off</mat-icon>
    Clear
  </button>
</div>
